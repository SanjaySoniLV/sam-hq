name: Export sam-hq-vit-tiny ONNX

on:
  workflow_dispatch:

jobs:
  export-onnx:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install onnx onnxruntime onnxscript timm

      - name: Export and validate sam-hq-vit-tiny ONNX
        run: |
          mkdir -p artifacts
          python scripts/export_tiny_onnx_and_validate.py \
            --checkpoint /tmp/sam-hq-vit-tiny/sam_hq_vit_tiny.pth \
            --output artifacts/sam_hq_vit_tiny.onnx

      - name: Upload ONNX artifact
        uses: actions/upload-artifact@v4
        with:
          name: sam-hq-vit-tiny-onnx
          path: artifacts/sam_hq_vit_tiny.onnx
          if-no-files-found: error
